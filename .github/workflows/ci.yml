name: UAWOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff black

      - name: Run ruff linter
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:14.12
        env:
          POSTGRES_DB: marquez
          POSTGRES_USER: marquez
          POSTGRES_PASSWORD: marquez
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U marquez"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.9.7
        ports:
          - 6333:6333

      opa:
        image: openpolicyagent/opa:0.65.0
        ports:
          - 8181:8181
        options: >-
          --entrypoint ""
        # OPA needs to run with 'run --server' command
      
      openfga:
        image: openfga/openfga:v1.5.5
        ports:
          - 8083:8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn psycopg2-binary qdrant-client networkx

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5435 -U marquez && break
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run self-tests
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5435
          POSTGRES_DB: marquez
          POSTGRES_USER: marquez
          POSTGRES_PASSWORD: marquez
          QDRANT_HOST: 127.0.0.1
          QDRANT_PORT: 6333
          OPA_HOST: 127.0.0.1
          OPA_PORT: 8181
          OPENFGA_HOST: 127.0.0.1
          OPENFGA_PORT: 8083
        run: python scratch/run_all_self_tests.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tools
        run: pip install pip-audit safety

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-1 || true
        continue-on-error: true

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t uawos-bff-image:${{ github.sha }} .
          docker build -t uawos-bff-image:latest .

      - name: Verify image
        run: docker images uawos-bff-image
