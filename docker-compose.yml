version: '3.8'

services:
  # Metadata storage backend for Marquez
  postgres:
    image: postgres:14
    container_name: uawos-postgres
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=marquez
      - POSTGRES_USER=marquez
      - POSTGRES_PASSWORD=marquez
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 10s
      timeout: 5s
      retries: 3

  # RAG Vector Database (FastEmbed / LlamaIndex / Haystack target)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: uawos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Governance Data Lineage (OpenLineage back-end)
  marquez:
    image: marquezproject/marquez:latest
    container_name: uawos-marquez
    ports:
      - "5000:5000"
      - "5002:5002"
    environment:
      - MARQUEZ_PORT=5000
      - MARQUEZ_ADMIN_PORT=5002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=marquez
      - POSTGRES_USER=marquez
      - POSTGRES_PASSWORD=marquez
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # BI & Analytics Layer (Apache Superset - Apache 2.0 replacement for AGPL Metabase)
  superset:
    image: apache/superset:latest
    container_name: uawos-superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=uawos_secure_analytics_key_2026
    restart: unless-stopped
    # Default login is admin/admin after initialization

  # Supply Chain Security & SBOM Intelligence (Dependency Track API & Frontend)
  dtrack-apiserver:
    image: dependencytrack/apiserver:latest
    container_name: uawos-dependency-track-api
    ports:
      - "8081:8081"
    volumes:
      - dtrack_data:/data
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend:latest
    container_name: uawos-dependency-track-ui
    ports:
      - "8085:8080"
    environment:
      - API_BASE_URL=http://localhost:8081
    depends_on:
      - dtrack-apiserver
    restart: unless-stopped

  # Policy Engine (OPA)
  opa:
    image: openpolicyagent/opa:latest
    container_name: uawos-opa
    ports:
      - "8181:8181"
    command: run --server --addr :8181
    restart: unless-stopped

  # OpenFGA Authorization Engine
  openfga:
    image: openfga/openfga:latest
    container_name: uawos-openfga
    ports:
      - "8083:8080"
    command: run
    restart: unless-stopped

  # GPLv3 Marker Wrapper isolated service
  marker-service:
    build: ./marker-service
    container_name: uawos-marker-service
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Enterprise Mocks (OpenMetadata, Telemetry, Alarms, OpenHands Sandbox)
  uawos-mocks:
    build: ./mock-services
    container_name: uawos-mocks
    ports:
      - "8585:8585"
      - "3000:3000"
      - "9093:9093"
      - "5001:5001"
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  dtrack_data:

