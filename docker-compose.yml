version: '3.8'

services:
  # Metadata storage backend for Marquez
  postgres:
    image: postgres:14
    container_name: uawos-postgres
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=marquez
      - POSTGRES_USER=marquez
      - POSTGRES_PASSWORD=marquez
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 10s
      timeout: 5s
      retries: 3

  # RAG Vector Database (FastEmbed / LlamaIndex / Haystack target)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: uawos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Governance Data Lineage (OpenLineage back-end)
  marquez:
    image: marquezproject/marquez:latest
    container_name: uawos-marquez
    ports:
      - "5000:5000"
      - "5002:5002"
    environment:
      - MARQUEZ_PORT=5000
      - MARQUEZ_ADMIN_PORT=5002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=marquez
      - POSTGRES_USER=marquez
      - POSTGRES_PASSWORD=marquez
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # BI & Analytics Layer (Apache Superset - Apache 2.0 replacement for AGPL Metabase)
  superset:
    image: apache/superset:latest
    container_name: uawos-superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=uawos_secure_analytics_key_2026
    restart: unless-stopped
    # Default login is admin/admin after initialization

  # Supply Chain Security & SBOM Intelligence (Dependency Track API & Frontend)
  dtrack-apiserver:
    image: dependencytrack/apiserver:latest
    container_name: uawos-dependency-track-api
    ports:
      - "8081:8081"
    volumes:
      - dtrack_data:/data
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend:latest
    container_name: uawos-dependency-track-ui
    ports:
      - "8085:8080"
    environment:
      - API_BASE_URL=http://localhost:8081
    depends_on:
      - dtrack-apiserver
    restart: unless-stopped

  # Policy Engine (OPA)
  opa:
    image: openpolicyagent/opa:latest
    container_name: uawos-opa
    ports:
      - "8181:8181"
    command: run --server --addr :8181
    restart: unless-stopped

  # OpenFGA Authorization Engine
  openfga:
    image: openfga/openfga:latest
    container_name: uawos-openfga
    ports:
      - "8083:8080"
    command: run
    restart: unless-stopped

  # GPLv3 Marker Wrapper isolated service
  marker-service:
    build: ./marker-service
    container_name: uawos-marker-service
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:latest
    container_name: uawos-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/7687' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Enterprise Mocks (OpenMetadata, Telemetry, Alarms, OpenHands Sandbox)
  uawos-mocks:
    build: ./mock-services
    container_name: uawos-mocks
    ports:
      - "8585:8585"
      - "3000:3000"
      - "9093:9093"
      - "5001:5001"
    restart: unless-stopped

  # ClickHouse Database (Telemetry and Analytics)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: uawos-clickhouse
    ports:
      - "8124:8123"
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Event Streaming (Zookeeper Coord)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: uawos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  # Event Streaming (Kafka Broker)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: uawos-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    restart: unless-stopped

  # Temporal Orchestrator (Orchestration Engine)
  temporal:
    image: temporalio/auto-setup:1.20.0
    container_name: uawos-temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=marquez
      - POSTGRES_PWD=marquez
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  dtrack_data:
  neo4j_data:
  clickhouse_data:

