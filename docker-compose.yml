services:
  # Metadata storage backend for Marquez
  postgres:
    image: postgres:14.12
    container_name: uawos-postgres
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-marquez}
      - POSTGRES_USER=${POSTGRES_USER:-marquez}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-marquez}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marquez}"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: ["core", "full"]

  # RAG Vector Database (FastEmbed / LlamaIndex / Haystack target)
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: uawos-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: ["core", "full"]

  # Governance Data Lineage (OpenLineage back-end)
  marquez:
    image: marquezproject/marquez:0.49.0
    container_name: uawos-marquez
    ports:
      - "${MARQUEZ_PORT:-5000}:5000"
      - "5002:5002"
    environment:
      - MARQUEZ_PORT=5000
      - MARQUEZ_ADMIN_PORT=5002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-marquez}
      - POSTGRES_USER=${POSTGRES_USER:-marquez}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-marquez}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["full"]

  # BI & Analytics Layer (Apache Superset - Apache 2.0 replacement for AGPL Metabase)
  superset:
    image: apache/superset:3.1.3
    container_name: uawos-superset
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ["full"]
    # Default login is admin/admin after initialization

  # Supply Chain Security & SBOM Intelligence (Dependency Track API & Frontend)
  dtrack-apiserver:
    image: dependencytrack/apiserver:4.11.4
    container_name: uawos-dependency-track-api
    ports:
      - "${DTRACK_PORT:-8081}:8081"
    volumes:
      - dtrack_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ["full"]

  dtrack-frontend:
    image: dependencytrack/frontend:4.11.4
    container_name: uawos-dependency-track-ui
    ports:
      - "${DTRACK_UI_PORT:-8085}:8080"
    environment:
      - API_BASE_URL=http://localhost:${DTRACK_PORT:-8081}
    depends_on:
      - dtrack-apiserver
    restart: unless-stopped
    profiles: ["full"]

  # Policy Engine (OPA)
  opa:
    image: openpolicyagent/opa:0.65.0
    container_name: uawos-opa
    ports:
      - "${OPA_PORT:-8181}:8181"
    command: run --server --addr :8181
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8181/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: ["core", "full"]

  # OpenFGA Authorization Engine
  openfga:
    image: openfga/openfga:v1.5.5
    container_name: uawos-openfga
    ports:
      - "${OPENFGA_PORT:-8083}:8080"
    command: run
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: ["core", "full"]

  # GPLv3 Marker Wrapper isolated service
  marker-service:
    build: ./marker-service
    container_name: uawos-marker-service
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: ["full"]

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.20.0
    container_name: uawos-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/uawos-change-me}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: ["full"]

  # Enterprise Mocks (OpenMetadata, Telemetry, Alarms, OpenHands Sandbox)
  uawos-mocks:
    build: ./mock-services
    container_name: uawos-mocks
    ports:
      - "8585:8585"
      - "3000:3000"
      - "9093:9093"
      - "5001:5001"
    restart: unless-stopped
    profiles: ["full"]

  # ClickHouse Database (Telemetry and Analytics)
  clickhouse:
    image: clickhouse/clickhouse-server:24.4
    container_name: uawos-clickhouse
    ports:
      - "${CLICKHOUSE_PORT:-8124}:8123"
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: ["full"]

  # Event Streaming (Zookeeper Coord)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: uawos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped
    profiles: ["full"]

  # Event Streaming (Kafka Broker)
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: uawos-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    restart: unless-stopped
    profiles: ["full"]

  # Temporal Orchestrator (Orchestration Engine)
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: uawos-temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-marquez}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-marquez}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["full"]

  # Weaverouter Database Sidecar
  weaverouter-db:
    image: postgres:15-alpine
    container_name: uawos-weaverouter-db
    environment:
      POSTGRES_USER: router
      POSTGRES_PASSWORD: router
      POSTGRES_DB: router
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router -d router"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - weaverouter_db_data:/var/lib/postgresql/data
      - ./weaverouter/db/init:/docker-entrypoint-initdb.d:ro
    profiles: ["core", "full"]

  # Weaverouter Pub/Sub Emulator for Cache Invalidation
  weaverouter-pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: uawos-weaverouter-pubsub
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "8085:8085"
    environment:
      PUBSUB_PROJECT_ID: router-local
      PUBSUB_TOPIC_ROUTER_INVALIDATION: router-installation-invalidate
    volumes:
      - ./weaverouter/db/pubsub/entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: ["core", "full"]

  # Weaverouter Database Migrations Runner
  weaverouter-migrate:
    image: migrate/migrate:v4.17.1
    container_name: uawos-weaverouter-migrate
    depends_on:
      weaverouter-db:
        condition: service_healthy
    volumes:
      - ./weaverouter/db/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://router:router@weaverouter-db:5432/router?sslmode=disable&search_path=router"
      - "up"
    restart: "no"
    profiles: ["core", "full"]

  # Weaverouter Core Server Proxy
  weaverouter-server:
    build:
      context: ./weaverouter
    container_name: uawos-weaverouter-server
    depends_on:
      weaverouter-db:
        condition: service_healthy
      weaverouter-migrate:
        condition: service_completed_successfully
      weaverouter-pubsub:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://router:router@weaverouter-db:5432/router?sslmode=disable
      PORT: "8080"
      ROUTER_ONNX_ASSETS_DIR: /opt/router/assets
      ROUTER_ONNX_LIBRARY_DIR: /usr/lib
      PUBSUB_EMULATOR_HOST: weaverouter-pubsub:8085
      PUBSUB_PROJECT_ID: router-local
      PUBSUB_TOPIC_ROUTER_INVALIDATION: router-installation-invalidate
      PUBSUB_SUBSCRIPTION_ROUTER_INVALIDATION: router-installation-invalidate
    ports:
      - "8092:8080" # Map host port 8092 to container port 8080
    restart: unless-stopped
    profiles: ["core", "full"]

  # Weaverouter Automatic Database Seeder (Seeds rk_uawos_dev_key)
  weaverouter-seed:
    image: golang:1.25-bookworm
    container_name: uawos-weaverouter-seed
    working_dir: /app
    volumes:
      - ./weaverouter:/app
      - go_modules:/go/pkg/mod
    depends_on:
      weaverouter-db:
        condition: service_healthy
      weaverouter-migrate:
        condition: service_completed_successfully
    environment:
      CGO_ENABLED: "0"
      DATABASE_URL: postgres://router:router@weaverouter-db:5432/router?sslmode=disable
      SEED_API_KEY: rk_uawos_dev_key
    command: ["go", "run", "./cmd/seed"]
    restart: "no"
    profiles: ["core", "full"]

volumes:
  postgres_data:
  qdrant_data:
  dtrack_data:
  neo4j_data:
  clickhouse_data:
  weaverouter_db_data:
  go_modules:
