# CI/CD Validation Pipeline Template for AI-EOS
# Location: .github/workflows/ai-eos-validation.yaml

name: AI-EOS Validation Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

jobs:
  validate-governance:
    name: Validate Specifications and Architecture Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv and Specify CLI
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv tool install specify-cli --from git+https://github.com/github/spec-kit.git@main

      - name: Validate Engineering Constitution
        run: |
          specify self check
          # Validate that specifications exist and follow the approved SpecKit template
          specify analyze --target spec

      - name: Validate OKF Metadata Schema
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install JSON Schema Validator
        run: npm install -g ajv-cli
      - name: Check OKF Metadata Integrity
        run: |
          # Recursively validate all frontmatter metadata against OKF JSON Schema
          # Uses custom parser script from scripts/validate_okf.js
          node scripts/validate_okf.js

  security-scans:
    name: Security Governance and Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: SAST Security Review
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript,python'
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  test-evaluation:
    name: Quality Gate and AI Evaluation Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Runtime Environments
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quality Gate validations
        run: |
          # Execute SpecKit assertions: specs match implementations, contracts aligned
          specify analyze --target contracts
          specify analyze --target coverage

      - name: Run Tests (Unit, Integration, Contract)
        run: |
          pytest tests/unit/ tests/integration/ tests/contracts/

      - name: Run AI Agent Evaluation Tests
        run: |
          # Execute the Agent performance evaluation test suite
          python -m pytest evals/agent_benchmarks.py

  deployment-readiness:
    name: Confirm Deployment and Observability Readiness
    runs-on: ubuntu-latest
    needs: [validate-governance, security-scans, test-evaluation]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Documentation & Observability Configuration
        run: |
          # Check for runbook completeness and existence of SLO/SLI metrics definitions
          python scripts/verify_observability_manifests.py
